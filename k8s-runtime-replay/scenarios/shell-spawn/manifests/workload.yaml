apiVersion: v1
kind: Pod
metadata:
  name: shell-spawn-target
  namespace: k8s-replay
  labels:
    scenario: shell-spawn
    managed-by: k8s-runtime-replay
spec:
  restartPolicy: Always
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
  containers:
    - name: target
      image: busybox:1.36
      command: ["sh", "-c", "while true; do sleep 3600; done"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      resources:
        limits:
          cpu: "100m"
          memory: "64Mi"
      livenessProbe:
        exec:
          command: ["sh", "-c", "true"]
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        exec:
          command: ["sh", "-c", "true"]
        initialDelaySeconds: 3
        periodSeconds: 5
