apiVersion: v1
kind: Pod
metadata:
  name: secret-enum-target
  namespace: k8s-replay
  labels:
    scenario: secret-enumeration
    managed-by: k8s-runtime-replay
spec:
  restartPolicy: Always
  serviceAccountName: secret-enum-sa
  automountServiceAccountToken: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
  containers:
    - name: target
      image: bitnami/kubectl:latest
      command: ["sh", "-c", "while true; do sleep 3600; done"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      resources:
        limits:
          cpu: "100m"
          memory: "64Mi"
      livenessProbe:
        exec:
          command: ["sh", "-c", "true"]
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        exec:
          command: ["sh", "-c", "true"]
        initialDelaySeconds: 3
        periodSeconds: 5
