apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-enum-sa
  namespace: k8s-replay
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-enum-role
  namespace: k8s-replay
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-enum-rolebinding
  namespace: k8s-replay
subjects:
  - kind: ServiceAccount
    name: secret-enum-sa
    namespace: k8s-replay
roleRef:
  kind: Role
  name: secret-enum-role
  apiGroup: rbac.authorization.k8s.io
